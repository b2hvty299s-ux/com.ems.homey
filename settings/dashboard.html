<!DOCTYPE html>
<html lang="nl">
<head>
  <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EMS Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:   #1a73e8; --green: #34a853; --orange: #fbbc04;
      --red:    #ea4335; --bg: #f8f9fa; --card: #fff; --border: #e0e0e0;
      --text:   #202124; --muted: #5f6368;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: var(--bg); color: var(--text); padding: 16px; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    @media(max-width:480px) { .grid, .grid-3 { grid-template-columns: 1fr; } }

    .card { background: var(--card); border-radius: 12px; padding: 16px;
            border: 1px solid var(--border); }
    .card-title { font-size: 11px; text-transform: uppercase; letter-spacing: .5px;
                  color: var(--muted); margin-bottom: 8px; }
    .card-value { font-size: 28px; font-weight: 700; }
    .card-sub   { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* Mode badge */
    .mode-badge { display: inline-block; padding: 4px 12px; border-radius: 20px;
                  font-size: 13px; font-weight: 600; }
    .mode-auto            { background: #e8f0fe; color: var(--blue); }
    .mode-battery_charge  { background: #fce8e6; color: var(--red); }
    .mode-solar_surplus   { background: #fef7e0; color: #e37400; }
    .mode-battery_discharge { background: #e6f4ea; color: var(--green); }
    .mode-grid_import     { background: #f3e8fd; color: #7b1fa2; }
    .mode-idle            { background: #f1f3f4; color: var(--muted); }

    /* Flow bars */
    .flow-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; font-size: 14px; }
    .flow-bar { flex: 1; height: 6px; border-radius: 3px; background: var(--border);
                overflow: hidden; }
    .flow-fill { height: 100%; border-radius: 3px; transition: width .5s; }
    .fill-solar   { background: var(--orange); }
    .fill-battery { background: var(--blue); }
    .fill-grid    { background: var(--red); }
    .fill-ev      { background: var(--green); }

    /* Battery SoC arc */
    .soc-arc { text-align: center; }
    .soc-arc svg { width: 80px; height: 80px; }
    .soc-num { font-size: 20px; font-weight: 700; }

    /* Plan table */
    .plan-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .plan-table th { text-align: left; padding: 6px 8px; color: var(--muted);
                     border-bottom: 1px solid var(--border); font-weight: 500; }
    .plan-table td { padding: 5px 8px; border-bottom: 1px solid #f0f0f0; }
    .plan-table tr.current { background: #e8f0fe; }
    .plan-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

    /* Trip card */
    .trip-form { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .trip-form input { flex: 1; min-width: 100px; padding: 8px 10px;
                       border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }
    .btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: 14px;
           font-weight: 500; cursor: pointer; }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-sm      { padding: 6px 12px; font-size: 13px; }
    .btn-danger  { background: var(--red); color: #fff; }

    h2 { font-size: 15px; margin: 16px 0 10px; }

    .dot-green  { background: var(--green); }
    .dot-orange { background: var(--orange); }
    .dot-blue   { background: var(--blue); }
    .dot-red    { background: var(--red); }
    .dot-grey   { background: #ccc; }
  </style>
</head>
<body>

<!-- Header -->
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
  <div>
    <div style="font-size:18px;font-weight:700">⚡ EMS Dashboard</div>
    <div style="font-size:12px;color:var(--muted)" id="lastUpdate">–</div>
  </div>
  <div id="modeBadge" class="mode-badge mode-auto">Auto</div>
</div>

<!-- Live power flow -->
<div class="grid-3" style="margin-bottom:12px">
  <div class="card">
    <div class="card-title">☀️ Zonnepanelen</div>
    <div class="card-value" id="pvW">–</div>
    <div class="card-sub" id="pvKwh">vandaag – kWh</div>
  </div>
  <div class="card">
    <div class="card-title">🔋 Batterij</div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="soc-arc">
        <svg viewBox="0 0 36 36">
          <circle cx="18" cy="18" r="15.9" fill="none" stroke="#e0e0e0" stroke-width="3"/>
          <circle cx="18" cy="18" r="15.9" fill="none" stroke="#1a73e8" stroke-width="3"
                  stroke-dasharray="0 100" stroke-linecap="round"
                  transform="rotate(-90 18 18)" id="socArc"/>
        </svg>
      </div>
      <div>
        <div class="card-value" id="batSoc">–</div>
        <div class="card-sub" id="batPower">– W</div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">🔌 Net</div>
    <div class="card-value" id="gridW">–</div>
    <div class="card-sub" id="gridDir">–</div>
  </div>
</div>

<!-- EV + Heatpump -->
<div class="grid" style="margin-bottom:12px">
  <div class="card" id="evCard">
    <div class="card-title">🚗 Tesla</div>
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div class="card-value" id="evStatus">–</div>
        <div class="card-sub" id="evDetail">–</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:var(--muted)">Stroom</div>
        <div style="font-size:18px;font-weight:700" id="evCurrentA">– A</div>
        <div style="font-size:11px;color:var(--muted)" id="evSource">–</div>
      </div>
    </div>
    <!-- Trip planning -->
    <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px">
      <div style="font-size:13px;font-weight:500;margin-bottom:6px">Rit plannen</div>
      <div class="trip-form">
        <input type="time" id="tripTime" />
        <input type="number" id="tripSoc" placeholder="SoC %" min="20" max="100" style="max-width:80px" />
        <button class="btn btn-primary btn-sm" onclick="planTrip()">Plan</button>
      </div>
      <div id="activeTripInfo" style="font-size:12px;color:var(--muted);margin-top:6px"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">🌡️ Warmtepomp</div>
    <div class="card-value" id="hpMode">–</div>
    <div class="card-sub" id="hpOffset">offset: –°C</div>
  </div>
</div>

<!-- Day plan -->
<div class="card" style="margin-bottom:12px">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <h2 style="margin:0">📅 Dagplan morgen</h2>
    <button class="btn btn-primary btn-sm" onclick="recalculate()">↻ Herbereken</button>
  </div>
  <div id="planSummary" style="font-size:13px;color:var(--muted);margin:8px 0"></div>
  <div style="overflow-x:auto">
    <table class="plan-table">
      <thead>
        <tr>
          <th>Uur</th><th>PV</th><th>Verbruik</th><th>Batterij</th><th>EV</th><th>Prijs</th>
        </tr>
      </thead>
      <tbody id="planTableBody">
        <tr><td colspan="6" style="padding:14px;color:var(--muted)">Plan laden...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="js/dashboard.js"></script>
<script>
  function onHomeyReady(Homey) {
    Homey.ready();
    _Homey = Homey;
    refresh();
    refreshInterval = setInterval(refresh, 10000);
  }
</script>
</body>
</html>
