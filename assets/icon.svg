<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!--
    EMS App Icon — Homey compliant
    - Transparent background (no rect fill)
    - Pure black paths only (no grey, no opacity)
    - Full canvas utilised
    - No text
  -->

  <!-- Outer hexagon frame -->
  <path
    d="M50 3 L91 26 L91 74 L50 97 L9 74 L9 26 Z"
    fill="none"
    stroke="black"
    stroke-width="6"
    stroke-linejoin="round"
  />

  <!-- Energy bolt — upper arm -->
  <path
    d="M45 22 L32 53 L50 53"
    fill="none"
    stroke="black"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Energy bolt — lower arm -->
  <path
    d="M50 53 L55 47 L68 47 L55 78"
    fill="none"
    stroke="black"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Corner accent dots — precision instrumentation feel -->
  <circle cx="50"  cy="3"  r="4" fill="black" />
  <circle cx="91"  cy="26" r="4" fill="black" />
  <circle cx="91"  cy="74" r="4" fill="black" />
  <circle cx="50"  cy="97" r="4" fill="black" />
  <circle cx="9"   cy="74" r="4" fill="black" />
  <circle cx="9"   cy="26" r="4" fill="black" />
</svg>
