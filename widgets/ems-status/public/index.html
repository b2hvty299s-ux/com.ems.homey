<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: var(--homey-font-family, -apple-system, sans-serif);
      background: transparent;
      color: var(--homey-text-color, #202124);
      display: flex;
      flex-direction: column;
      padding: 10px 12px 6px;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
      flex-shrink: 0;
    }
    .title   { font-size: 10px; font-weight: 700; opacity: .45; letter-spacing: .8px; text-transform: uppercase; }
    .subdate { font-size: 9px; opacity: .35; margin-top: 1px; }

    .badge-ok   { font-size: 9px; padding: 2px 8px; border-radius: 6px; font-weight: 700;
                  background: rgba(34,197,94,.13); color: #22c55e; white-space: nowrap; }
    .badge-warn { font-size: 9px; padding: 2px 8px; border-radius: 6px; font-weight: 700;
                  background: rgba(245,158,11,.13); color: #f59e0b; white-space: nowrap; }
    .badge-none { font-size: 9px; padding: 2px 8px; border-radius: 6px; font-weight: 700;
                  background: rgba(128,128,128,.10); color: rgba(128,128,128,.5); }

    /* ── Summary row ── */
    .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .sum-item { display: flex; align-items: baseline; gap: 2px; white-space: nowrap; }
    .sum-val  { font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
    .sum-unit { font-size: 8px; opacity: .45; }
    .sep      { font-size: 11px; opacity: .2; }
    .ev-tag   { font-size: 9px; font-weight: 600; padding: 1px 7px; border-radius: 5px;
                background: rgba(249,115,22,.10); color: #f97316; white-space: nowrap; }

    /* ── Chart fills remaining space ── */
    .chart-wrap {
      flex: 1;
      position: relative;
      min-height: 0;
      margin-bottom: 5px;
    }
    .chart-wrap canvas {
      width: 100% !important;
      height: 100% !important;
    }

    /* ── No plan ── */
    .no-plan {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      opacity: .3;
      font-size: 11px;
      text-align: center;
    }
    .no-plan-icon { font-size: 24px; }

    /* ── Footer ── */
    .footer {
      display: flex;
      justify-content: space-between;
      font-size: 8px;
      opacity: .3;
      border-top: 1px solid rgba(128,128,128,.15);
      padding-top: 3px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <div class="title">☀️ EMS Morgen</div>
      <div class="subdate" id="planDate">–</div>
    </div>
    <span id="feasBadge" class="badge-none">–</span>
  </div>

  <div class="meta" id="meta" style="display:none">
    <div class="sum-item">
      <span class="sum-val" id="sTotPv" style="color:#22c55e">–</span>
      <span class="sum-unit">kWh zon</span>
    </div>
    <span class="sep">·</span>
    <div class="sum-item">
      <span class="sum-val" id="sEvNeeded" style="color:#f97316">–</span>
      <span class="sum-unit">kWh EV</span>
    </div>
    <span class="sep">·</span>
    <div class="sum-item">
      <span class="sum-val" id="sBatAvail" style="color:#eab308">–</span>
      <span class="sum-unit">kWh accu</span>
    </div>
    <span class="ev-tag" id="evTag" style="display:none">⚡ <span id="evWindow">–</span></span>
  </div>

  <div class="chart-wrap" id="chartWrap" style="display:none">
    <canvas id="forecastChart"></canvas>
  </div>

  <div class="no-plan" id="noPlan">
    <div class="no-plan-icon">📅</div>
    <div>Dagplan wordt elke avond om 22:00 berekend</div>
  </div>

  <div class="footer">
    <span id="liveMode">–</span>
    <span id="calcAt">–</span>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script>
    const MODE_LABELS = {
      auto: 'Auto', battery_charge: '↑ Laden', solar_surplus: '☀ Overschot',
      battery_discharge: '↓ Ontladen', grid_import: '⚡ Net', idle: 'Inactief',
    };
    const HOURS = Array.from({ length: 24 }, (_, i) => String(i).padStart(2,'0') + ':00');

    function $id(id) { return document.getElementById(id); }
    function set(id, val) { const el = $id(id); if (el) el.textContent = val; }
    function show(id, vis) { const el = $id(id); if (el) el.style.display = vis ? '' : 'none'; }
    function fmtKwh(v) { return v != null ? (+v).toFixed(1) : '–'; }

    function fmtDate(iso) {
      if (!iso) return '–';
      const d = new Date(iso + 'T12:00:00');
      return d.toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long' });
    }
    function fmtTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return 'berekend ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    }
    function evWindow(schedule) {
      if (!schedule) return null;
      const evH = schedule.filter(s => s.evCharging).map(s => s.hour);
      if (!evH.length) return null;
      return String(evH[0]).padStart(2,'0') + ':00–' + String(evH[evH.length-1]+1).padStart(2,'0') + ':00';
    }

    let chart = null;

    function buildChart(schedule) {
      const isDark    = window.matchMedia?.('(prefers-color-scheme: dark)').matches;
      const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
      const tickColor = isDark ? 'rgba(255,255,255,0.28)'  : 'rgba(0,0,0,0.28)';

      const pvW     = schedule.map(s => Math.round((s.pvKwh     ?? 0) * 1000));
      const consumW = schedule.map(s => Math.round((s.consumKwh ?? 0) * 1000));
      const batChgW = schedule.map(s =>
        (s.batAction === 'charge' || s.batAction === 'grid_charge')
          ? Math.round((s.batDeltaKwh ?? 0) * 1000) : 0);
      const batDisW = schedule.map(s =>
        s.batAction === 'discharge' ? -Math.round((s.batDeltaKwh ?? 0) * 1000) : null);
      const evW     = schedule.map(s => {
        if (!s.evCharging) return 0;
        return Math.round(Math.max(0, (s.pvKwh - s.consumKwh - (s.batDeltaKwh ?? 0)) * 1000)) || 1500;
      });
      const socLine = schedule.map(s => s.batSocPct ?? null);

      const ctx = $id('forecastChart').getContext('2d');
      if (chart) chart.destroy();

      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: HOURS,
          datasets: [
            { label: 'Zon',     data: pvW,     borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.18)',   fill: 'origin', tension: 0.45, borderWidth: 2,   pointRadius: 0, yAxisID: 'yW', order: 5 },
            { label: 'Verbruik',data: consumW,  borderColor: 'rgba(128,128,128,0.45)', backgroundColor:'transparent', fill: false, tension: 0.3, borderWidth: 1.2, borderDash:[4,3], pointRadius: 0, yAxisID: 'yW', order: 6 },
            { label: 'Accu ↑',  data: batChgW, borderColor: '#eab308', backgroundColor: 'rgba(234,179,8,0.32)',   fill: 'origin', tension: 0.2, borderWidth: 1.4, pointRadius: 0, yAxisID: 'yW', order: 3 },
            { label: 'Accu ↓',  data: batDisW, borderColor: '#1a73e8', backgroundColor: 'rgba(26,115,232,0.18)', fill: 'origin', tension: 0.2, borderWidth: 1.4, pointRadius: 0, yAxisID: 'yW', order: 2 },
            { label: 'EV',      data: evW,     borderColor: '#f97316', backgroundColor: 'rgba(249,115,22,0.35)', fill: 'origin', tension: 0.2, borderWidth: 1.4, pointRadius: 0, yAxisID: 'yW', order: 4 },
            { label: 'SoC %',   data: socLine, borderColor: 'rgba(234,179,8,0.6)', backgroundColor: 'transparent', fill: false, tension: 0.3, borderWidth: 1.2, borderDash:[2,2], pointRadius: 0, yAxisID: 'ySoc', order: 1 },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 500 },
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              bodyFont: { size: 9 },
              callbacks: {
                label: ctx => {
                  const v = ctx.parsed.y;
                  if (v == null || v === 0) return null;
                  if (ctx.dataset.yAxisID === 'ySoc') return ` SoC: ${v.toFixed(0)}%`;
                  const s = Math.abs(v) >= 950 ? (v/1000).toFixed(1)+' kW' : Math.round(v)+' W';
                  return ' ' + ctx.dataset.label + ': ' + s;
                },
              },
            },
          },
          scales: {
            x: {
              ticks: { font:{size:8}, color:tickColor, maxTicksLimit:7, maxRotation:0,
                       callback: (_, i) => (i % 4 === 0) ? HOURS[i] : '' },
              grid: { color: gridColor },
            },
            yW: {
              type: 'linear', position: 'left',
              ticks: { font:{size:8}, color:tickColor,
                       callback: v => Math.abs(v)>=950 ? (v/1000).toFixed(0)+'k' : v },
              grid: { color: gridColor },
            },
            ySoc: {
              type: 'linear', position: 'right', min: 0, max: 100,
              ticks: { font:{size:8}, color:'rgba(234,179,8,0.55)', callback: v => v+'%', maxTicksLimit:4 },
              grid: { drawOnChartArea: false },
            },
          },
        },
      });
    }

    async function refresh() {
      try {
        const [s, plan] = await Promise.all([
          Homey.api('GET', '/getState', {}),
          Homey.api('GET', '/getPlan', {}),
        ]);

        if (s?.ready) set('liveMode', 'Nu: ' + (MODE_LABELS[s.mode] || s.mode || '–'));

        const hasPlan = plan?.schedule?.length > 0;
        show('noPlan',    !hasPlan);
        show('meta',       hasPlan);
        show('chartWrap',  hasPlan);

        if (!hasPlan) {
          set('planDate', 'Nog geen plan');
          $id('feasBadge').textContent = '–';
          $id('feasBadge').className   = 'badge-none';
          return;
        }

        const sum = plan.summary;
        set('planDate', fmtDate(plan.date));
        set('calcAt',   fmtTime(plan.calculatedAt));

        const badge = $id('feasBadge');
        badge.textContent = sum.prio1Feasible ? '✓ Haalbaar' : '⚠ Krap';
        badge.className   = sum.prio1Feasible ? 'badge-ok' : 'badge-warn';

        set('sTotPv',    fmtKwh(sum.totalPvKwh));
        set('sEvNeeded', fmtKwh(sum.evNeededKwh));
        set('sBatAvail', fmtKwh(sum.batAvailKwh));

        const evWin = evWindow(plan.schedule);
        if (evWin && sum.evNeededKwh > 0) { set('evWindow', evWin); show('evTag', true); }
        else show('evTag', false);

        buildChart(plan.schedule);
      } catch(e) { console.error('[EMS morgen]', e); }
    }

    function onHomeyReady(Homey) {
      Homey.ready({ height: 500 });
      refresh();
      setInterval(refresh, 60_000);
    }
  </script>
</body>
</html>
